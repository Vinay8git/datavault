# Test configuration for scheduler tests
# Use a random port for gRPC server in tests to avoid conflicts
grpc.server.port=0

# Disable RabbitMQ auto-configuration for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Auth service integration for protected API validation
auth.service-base-url=${AUTH_SERVICE_BASE_URL:http://localhost:4000}
auth.me-endpoint=${AUTH_ME_ENDPOINT:/auth/me}
auth.timeout-ms=${AUTH_TIMEOUT_MS:2500}